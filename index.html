<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrante CR Radio | La voz que nos une</title>
    
    <meta property="og:title" content="Migrante CR Radio | En Vivo">
    <meta property="og:description" content="Sintoniza nuestra radio, chatea en vivo y pide tus canciones.">
    <meta property="og:image" content="https://radio.migrantecr.org/api/nowplaying/migrantecr_radio">
    <meta property="og:url" content="https://radio-online.migrantecr.org">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0c0c0e; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .playing-animation { border: 4px solid #eab308; box-shadow: 0 0 30px rgba(234, 179, 8, 0.3); }
        .chat-container { height: 400px; width: 100%; max-width: 400px; }
        iframe { border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="max-w-6xl mx-auto w-full p-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
            <span class="text-xl font-extrabold tracking-tight uppercase">MigranteCR <span class="text-yellow-500">Radio</span></span>
        </div>
        <div class="flex gap-4">
            <a href="https://www.facebook.com/profile.php?id=61579491627168" target="_blank" class="text-zinc-400 hover:text-blue-500 transition">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto w-full flex flex-col lg:flex-row items-center justify-center gap-12 px-6 py-10">
        
        <div class="flex flex-col items-center text-center lg:w-1/2">
            <div class="relative mb-8 group">
                <div id="art-container" class="w-64 h-64 md:w-72 md:h-72 rounded-[2rem] overflow-hidden transition-all duration-700 shadow-2xl">
                    <img id="art" src="https://radio.migrantecr.org/api/nowplaying/migrantecr_radio" class="w-full h-full object-cover" alt="Ahora suena">
                </div>
                <button id="play-btn" class="absolute inset-0 flex items-center justify-center bg-black/40 md:opacity-0 group-hover:opacity-100 transition-opacity">
                    <div class="bg-yellow-500 p-6 rounded-full">
                        <svg id="play-icon" class="w-10 h-10 text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </button>
            </div>

            <h1 id="title" class="text-2xl md:text-4xl font-extrabold mb-2 tracking-tight">Conectando...</h1>
            <p id="artist" class="text-yellow-500 font-bold uppercase tracking-[0.3em] text-xs mb-8">Migrante CR Radio</p>

            <div class="flex gap-4">
                <a href="https://wa.me/50660210724" target="_blank" class="glass px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-green-600/20 transition border-green-500/30">
                    <span class="text-green-500 font-black">WhatsApp</span>
                </a>
                <a href="https://radio.migrantecr.org/public/migrantecr_radio/podcasts" target="_blank" class="glass px-6 py-3 rounded-xl font-bold hover:bg-white/10 transition">Podcasts</a>
            </div>
        </div>

        <div class="lg:w-1/2 w-full flex flex-col items-center">
            <h3 class="text-sm font-bold uppercase tracking-widest text-zinc-500 mb-4">Chat en vivo</h3>
            <div class="chat-container shadow-2xl">
                <iframe src="https://radio.migrantecr.org/public/migrantecr_radio/chat" width="100%" height="100%" frameborder="0" allowtransparency="true"></iframe>
            </div>
        </div>

    </main>

    <audio id="stream" src="https://radio.migrantecr.org/listen/migrantecr_radio/radio.mp3"></audio>

    <script>
        const audio = document.getElementById('stream');
        const playBtn = document.getElementById('play-btn');
        const art = document.getElementById('art');
        const artContainer = document.getElementById('art-container');
        const title = document.getElementById('title');
        const artist = document.getElementById('artist');
        const playIcon = document.getElementById('play-icon');

        async function updateNowPlaying() {
            try {
                const res = await fetch('https://radio.migrantecr.org/api/nowplaying/migrantecr_radio');
                const data = await res.json();
                const song = data.now_playing.song;
                
                if (title.innerText !== song.title) {
                    title.innerText = song.title;
                    artist.innerText = song.artist;
                    art.src = song.art;
                }
            } catch (e) { console.log("API offline"); }
        }

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                artContainer.classList.add('playing-animation');
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                audio.pause();
                artContainer.classList.remove('playing-animation');
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        };

        setInterval(updateNowPlaying, 10000);
        updateNowPlaying();
    </script>
</body>
</html>
