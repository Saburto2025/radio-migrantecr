<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MigranteCR Radio | En Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .playing { animation: pulse 2s infinite; border-color: #eab308; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(234, 179, 8, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); } }
    </style>
</head>
<body class="text-zinc-100 flex flex-col min-h-screen">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto w-full">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-red-600 rounded-full animate-ping"></div>
            <span class="font-black text-xl tracking-tighter uppercase">MigranteCR <span class="text-yellow-500">Radio</span></span>
        </div>
        <div class="flex gap-4 text-xs font-bold uppercase tracking-widest">
            <a href="https://radio.migrantecr.org/public/migrantecr_radio/podcasts" target="_blank" class="hover:text-yellow-500 transition">Podcasts</a>
            <a href="https://radio.migrantecr.org/public/migrantecr_radio/schedule" target="_blank" class="hover:text-yellow-500 transition">Horarios</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-4">
        <div id="cover-container" class="relative group mb-8">
            <img id="art" src="https://radio.migrantecr.org/api/nowplaying/migrantecr_radio" class="w-72 h-72 rounded-3xl object-cover shadow-2xl transition-transform duration-500 group-hover:scale-105 border-4 border-transparent" alt="Album Art">
            <button id="play-btn" class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity rounded-3xl">
                <svg id="play-icon" class="w-24 h-24 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"/></svg>
            </button>
        </div>

        <h1 id="title" class="text-3xl md:text-5xl font-black text-center mb-2">Conectando...</h1>
        <p id="artist" class="text-yellow-500 uppercase tracking-[0.3em] font-bold text-sm mb-12 text-center text-zinc-400">Migrante CR Radio</p>
        
        <div class="flex gap-4">
             <a href="https://wa.me/TU_NUMERO" class="glass px-8 py-4 rounded-full font-bold hover:bg-white/10 transition flex items-center gap-2">
                <span>WhatsApp</span>
             </a>
        </div>
    </main>

    <audio id="stream" src="https://radio.migrantecr.org/listen/migrantecr_radio/radio.mp3"></audio>

    <script>
        const audio = document.getElementById('stream');
        const playBtn = document.getElementById('play-btn');
        const art = document.getElementById('art');
        const title = document.getElementById('title');
        const artist = document.getElementById('artist');

        // Función para actualizar datos de AzuraCast
        async function updateNowPlaying() {
            try {
                const res = await fetch('https://radio.migrantecr.org/api/nowplaying/migrantecr_radio');
                const data = await res.json();
                title.innerText = data.now_playing.song.title;
                artist.innerText = data.now_playing.song.artist;
                art.src = data.now_playing.song.art;
            } catch (e) { console.error("Error cargando API"); }
        }

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                art.classList.add('playing');
                document.getElementById('play-icon').innerHTML = '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />';
            } else {
                audio.pause();
                art.classList.remove('playing');
                document.getElementById('play-icon').innerHTML = '<path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.841z"/>';
            }
        };

        setInterval(updateNowPlaying, 15000); // Actualiza cada 15 seg
        updateNowPlaying();
    </script>
</body>
</html>
