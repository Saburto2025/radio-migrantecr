<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrante CR Radio | La voz que nos une</title>
    <meta name="description" content="Sintoniza Migrante CR Radio en vivo. Música, podcasts y programación para nuestra comunidad.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0c0c0e; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(234, 179, 8, 0.4); transform: translateY(-2px); transition: all 0.3s; }
        .playing-animation { border: 3px solid #eab308; box-shadow: 0 0 30px rgba(234, 179, 8, 0.2); }
<meta property="og:title" content="Migrante CR Radio | En Vivo">
<meta property="og:description" content="Sintoniza la radio que nos une. Escucha música y programas en vivo aquí.">
<meta property="og:image" content="https://radio.migrantecr.org/api/nowplaying/migrantecr_radio">
<meta property="og:url" content="https://radio-online.migrantecr.org">
<meta name="twitter:card" content="summary_large_image">
    
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="max-w-6xl mx-auto w-full p-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
            <span class="text-xl font-extrabold tracking-tight uppercase">MigranteCR <span class="text-yellow-500">Radio</span></span>
        </div>
        <div class="hidden md:flex gap-8 text-sm font-semibold uppercase tracking-wider text-zinc-400">
            <a href="https://radio.migrantecr.org/public/migrantecr_radio/podcasts" class="hover:text-yellow-500">Podcasts</a>
            <a href="https://radio.migrantecr.org/public/migrantecr_radio/schedule" class="hover:text-yellow-500">Horarios</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-6 py-10">
        
        <div class="relative mb-10 group">
            <div id="art-container" class="w-64 h-64 md:w-80 md:h-80 rounded-[2rem] overflow-hidden transition-all duration-700">
                <img id="art" src="https://radio.migrantecr.org/api/nowplaying/migrantecr_radio" class="w-full h-full object-cover shadow-2xl" alt="Ahora suena">
            </div>
            <button id="play-btn" class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                <div class="bg-yellow-500 p-6 rounded-full shadow-xl">
                    <svg id="play-icon" class="w-12 h-12 text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
            </button>
        </div>

        <div class="text-center max-w-2xl mb-12">
            <h1 id="title" class="text-3xl md:text-5xl font-extrabold mb-3 leading-tight tracking-tight">Cargando señal...</h1>
            <p id="artist" class="text-yellow-500 font-bold uppercase tracking-[0.4em] text-xs md:text-sm">Conectando con el estudio</p>
        </div>

        <div class="flex flex-wrap justify-center gap-4">
            <a href="https://wa.me/TU_WHATSAPP" target="_blank" class="glass btn-glow px-8 py-4 rounded-2xl font-bold flex items-center gap-3">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.888 11.888-11.888 3.176 0 6.161 1.237 8.404 3.48s3.481 5.229 3.481 8.406c0 6.556-5.333 11.888-11.889 11.888-2.013 0-3.987-.51-5.742-1.478l-6.141 1.611zm6.105-3.515c1.646.979 3.26 1.464 4.889 1.464 5.434 0 9.855-4.422 9.855-9.855 0-2.628-1.024-5.1-2.885-6.958-1.861-1.859-4.332-2.883-6.96-2.883-5.435 0-9.856 4.422-9.856 9.856 0 1.933.568 3.766 1.643 5.311l-1.074 3.92 4.026-.96c.158.092.31.18.462.265z"/></svg>
                Cabina
            </a>
            <a href="https://instagram.com/TU_INSTAGRAM" target="_blank" class="glass btn-glow px-8 py-4 rounded-2xl font-bold flex items-center gap-3">
                Instagram
            </a>
        </div>
    </main>

    <footer class="p-8 text-center text-zinc-600 text-xs">
        <p>&copy; 2026 Migrante CR Radio. Todos los derechos reservados.</p>
    </footer>

    <audio id="stream" src="https://radio.migrantecr.org/listen/migrantecr_radio/radio.mp3"></audio>

    <script>
        const audio = document.getElementById('stream');
        const playBtn = document.getElementById('play-btn');
        const art = document.getElementById('art');
        const artContainer = document.getElementById('art-container');
        const title = document.getElementById('title');
        const artist = document.getElementById('artist');
        const playIcon = document.getElementById('play-icon');

        async function updateNowPlaying() {
            try {
                const res = await fetch('https://radio.migrantecr.org/api/nowplaying/migrantecr_radio');
                const data = await res.json();
                const song = data.now_playing.song;
                
                if (title.innerText !== song.title) {
                    title.innerText = song.title;
                    artist.innerText = song.artist;
                    art.src = song.art;
                }
            } catch (e) { console.log("API offline"); }
        }

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                artContainer.classList.add('playing-animation');
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                audio.pause();
                artContainer.classList.remove('playing-animation');
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        };

        setInterval(updateNowPlaying, 10000);
        updateNowPlaying();
    </script>
</body>
</html>
