<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrante CR Radio | En Vivo</title>
    
    <meta property="og:title" content="Migrante CR Radio">
    <meta property="og:description" content="La voz que nos une. Escúchanos en vivo y chatea con nosotros.">
    <meta property="og:image" content="https://radio.migrantecr.org/api/nowplaying/migrantecr_radio">
    <meta property="og:url" content="https://radio-online.migrantecr.org">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0c0c0e; 
            color: white; 
            margin: 0;
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .playing-glow { 
            border: 4px solid #eab308; 
            box-shadow: 0 0 40px rgba(234, 179, 8, 0.2); 
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .chat-frame {
            height: 500px;
            width: 100%;
            border-radius: 20px;
            background: #18181b;
        }
        @media (min-width: 1024px) {
            .chat-frame { height: 600px; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="w-full p-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-red-600 rounded-full animate-ping"></div>
            <span class="text-xl font-extrabold uppercase tracking-tighter">MigranteCR <span class="text-yellow-500">Radio</span></span>
        </div>
        <div class="flex gap-5 items-center">
            <a href="https://www.facebook.com/profile.php?id=61579491627168" target="_blank" class="hover:text-blue-500 transition-colors">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </a>
            <a href="https://wa.me/50660210724" target="_blank" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-full text-xs font-bold transition">WHATSAPP</a>
        </div>
    </nav>

    <main class="flex-grow grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-7xl mx-auto w-full px-6 py-4 items-center">
        
        <div class="flex flex-col items-center lg:items-start text-center lg:text-left">
            <div class="relative group mb-8">
                <div id="art-box" class="w-64 h-64 md:w-80 md:h-80 rounded-[2.5rem] overflow-hidden shadow-2xl transition-all duration-500">
                    <img id="art-img" src="https://radio.migrantecr.org/api/nowplaying/migrantecr_radio" class="w-full h-full object-cover" alt="Cover Art">
                </div>
                <button id="master-play" class="absolute inset-0 flex items-center justify-center bg-black/30 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity">
                    <div class="bg-yellow-500 p-8 rounded-full text-black shadow-2xl">
                        <svg id="play-svg" class="w-12 h-12" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </button>
            </div>
            
            <h2 id="track-title" class="text-3xl md:text-5xl font-black mb-3">Cargando señal...</h2>
            <p id="track-artist" class="text-yellow-500 font-bold uppercase tracking-[0.3em] text-sm mb-8 italic">Migrante CR Radio</p>
            
            <div class="flex flex-wrap gap-4 justify-center lg:justify-start">
                <a href="https://radio.migrantecr.org/public/migrantecr_radio/podcasts" target="_blank" class="glass px-8 py-4 rounded-2xl font-bold hover:bg-white/10 transition">Podcast</a>
                <a href="https://radio.migrantecr.org/public/migrantecr_radio/schedule" target="_blank" class="glass px-8 py-4 rounded-2xl font-bold hover:bg-white/10 transition border-white/20">Horarios</a>
            </div>
        </div>

        <div class="w-full">
            <div class="mb-4 flex items-center justify-between px-2">
                <h3 class="text-sm font-bold uppercase tracking-widest text-zinc-500">Chat de la Comunidad</h3>
                <span class="text-[10px] bg-zinc-800 px-2 py-1 rounded text-zinc-400">EN VIVO</span>
            </div>
            <div class="glass p-2 rounded-[2rem]">
                <iframe 
                    src="https://radio.migrantecr.org/public/migrantecr_radio/chat" 
                    class="chat-frame" 
                    frameborder="0" 
                    allowtransparency="true">
                </iframe>
            </div>
        </div>

    </main>

    <audio id="radio-source" src="https://radio.migrantecr.org/listen/migrantecr_radio/radio.mp3"></audio>

    <footer class="p-8 text-center text-zinc-600 text-[10px] uppercase tracking-widest">
        &copy; 2026 Migrante CR Radio | Diseñado para el impacto social
    </footer>

    <script>
        const audio = document.getElementById('radio-source');
        const playBtn = document.getElementById('master-play');
        const playSvg = document.getElementById('play-svg');
        const artBox = document.getElementById('art-box');
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const artImg = document.getElementById('art-img');

        // Función para actualizar datos desde AzuraCast
        async function fetchNowPlaying() {
            try {
                const response = await fetch('https://radio.migrantecr.org/api/nowplaying/migrantecr_radio');
                const data = await response.json();
                const now = data.now_playing.song;
                
                if (trackTitle.innerText !== now.title) {
                    trackTitle.innerText = now.title;
                    trackArtist.innerText = now.artist;
                    artImg.src = now.art;
                }
            } catch (error) {
                console.error("Error de conexión con AzuraCast");
            }
        }

        // Control del Reproductor
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                artBox.classList.add('playing-glow');
                playSvg.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                audio.pause();
                artBox.classList.remove('playing-glow');
                playSvg.innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        });

        // Actualización automática cada 15 segundos
        setInterval(fetchNowPlaying, 15000);
        fetchNowPlaying();
    </script>
</body>
</html>
