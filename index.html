<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrante CR Radio | En Vivo</title>
    
    <meta property="og:title" content="Migrante CR Radio | En Vivo">
    <meta property="og:description" content="Sintoniza nuestra radio, chatea en vivo y pide tus canciones.">
    <meta property="og:image" content="https://radio.migrantecr.org/api/nowplaying/migrantecr_radio">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0c0c0e; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .playing-glow { border: 4px solid #eab308; box-shadow: 0 0 30px rgba(234, 179, 8, 0.3); transition: all 0.5s; }
        .chat-frame { height: 500px; width: 100%; border-radius: 1.5rem; background: #18181b; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="max-w-7xl mx-auto w-full p-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></div>
            <span class="text-xl font-extrabold tracking-tight uppercase">MigranteCR <span class="text-yellow-500">Radio</span></span>
        </div>
        <div class="flex items-center gap-4">
            <a href="https://www.facebook.com/profile.php?id=61579491627168" target="_blank" class="hover:text-blue-500 transition">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto w-full flex flex-col lg:grid lg:grid-cols-2 gap-12 px-6 py-10 items-center">
        
        <div class="flex flex-col items-center lg:items-start text-center lg:text-left w-full">
            <div class="relative mb-8 group cursor-pointer" id="master-play">
                <div id="art-container" class="w-64 h-64 md:w-80 md:h-80 rounded-[2.5rem] overflow-hidden shadow-2xl transition-all duration-700">
                    <img id="art" src="https://radio.migrantecr.org/api/nowplaying/migrantecr_radio" class="w-full h-full object-cover" alt="Cover">
                </div>
                <div class="absolute inset-0 flex items-center justify-center bg-black/40 lg:opacity-0 group-hover:opacity-100 transition-opacity rounded-[2.5rem]">
                    <div class="bg-yellow-500 p-6 rounded-full text-black shadow-xl">
                        <svg id="play-icon" class="w-12 h-12" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
            </div>

            <h1 id="title" class="text-3xl md:text-5xl font-extrabold mb-2 tracking-tight">Cargando...</h1>
            <p id="artist" class="text-yellow-500 font-bold uppercase tracking-[0.3em] text-sm mb-10 text-zinc-400">En Vivo</p>
            
            <div class="flex flex-wrap justify-center lg:justify-start gap-4">
                <a href="https://wa.me/50660210724" target="_blank" class="bg-green-600 px-8 py-4 rounded-2xl font-bold flex items-center gap-2 hover:bg-green-500 transition shadow-lg shadow-green-900/20">
                    <span>WhatsApp Cabina</span>
                </a>
                <a href="https://radio.migrantecr.org/public/migrantecr_radio/podcasts" target="_blank" class="glass px-8 py-4 rounded-2xl font-bold hover:bg-white/10 transition">Podcasts</a>
            </div>
        </div>

        <div class="w-full flex flex-col items-center">
            <div class="mb-4 flex items-center justify-between w-full max-w-md px-2">
                <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 italic">Chat en Vivo</h3>
                <span class="text-[10px] bg-red-600 px-2 py-0.5 rounded-full font-bold animate-pulse">LIVE</span>
            </div>
            <iframe src="https://radio.migrantecr.org/public/migrantecr_radio/chat?embed=true" class="chat-frame glass" frameborder="0" allowtransparency="true"></iframe>
        </div>

    </main>

    <audio id="stream" src="https://radio.migrantecr.org/listen/migrantecr_radio/radio.mp3"></audio>

    <footer class="p-8 text-center text-zinc-700 text-[10px] uppercase tracking-widest mt-auto">
        &copy; 2026 Migrante CR Radio | San José, Costa Rica
    </footer>

    <script>
        const audio = document.getElementById('stream');
        const playBtn = document.getElementById('master-play');
        const art = document.getElementById('art');
        const artContainer = document.getElementById('art-container');
        const title = document.getElementById('title');
        const artist = document.getElementById('artist');
        const playIcon = document.getElementById('play-icon');

        async function updateNowPlaying() {
            try {
                const res = await fetch('https://radio.migrantecr.org/api/nowplaying/migrantecr_radio');
                const data = await res.json();
                const song = data.now_playing.song;
                if (title.innerText !== song.title) {
                    title.innerText = song.title;
                    artist.innerText = song.artist;
                    art.src = song.art;
                }
            } catch (e) { console.log("Error API"); }
        }

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                artContainer.classList.add('playing-glow');
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                audio.pause();
                artContainer.classList.remove('playing-glow');
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        };

        setInterval(updateNowPlaying, 15000);
        updateNowPlaying();
    </script>
</body>
</html>
